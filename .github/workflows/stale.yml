name: Close stale issues

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: "This issue has been inactive for 30 days. Comment to keep it open."
          close-issue-message: "Closing due to inactivity."
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
